name: APK Update Service
version: "0.1.0"
slug: apk_update_service
description: >-
  Self-hosted Android APK update server. Subscribes to a webhookrelay bucket
  for new GitHub releases, downloads APK assets, and serves /api/latest.json
  and /api/download/<file> for in-app self-updaters.
url: https://github.com/Shaffer-Softworks/apk-update-service-addon
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
init: false
startup: services
boot: auto
hassio_api: false
homeassistant_api: false
ingress: true
ingress_port: 8099
panel_icon: mdi:android
panel_title: APK Updates
ports:
  "8099/tcp": 8099
ports_description:
  "8099/tcp": HTTP API + ingress (expose on LAN so Android clients can reach it)
map:
  - data:rw
options:
  webhookrelay:
    key: ""
    secret: ""
    bucket: ""
  github_token: ""
  download_base_url: ""
  flavors:
    - id: keypad
      filename_pattern: ".*keypad.*\\.apk$"
    - id: tablet
      filename_pattern: ".*tablet(?!.*dpc).*\\.apk$"
    - id: tabletdpc
      filename_pattern: ".*tablet.*dpc.*\\.apk$"
  log_level: info
schema:
  webhookrelay:
    key: str
    secret: password
    bucket: str
  github_token: password
  download_base_url: str?
  flavors:
    - id: str
      filename_pattern: str
      package_name: str?
  log_level: list(debug|info|warn|error)
